services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: billmind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: billmind
      POSTGRES_PASSWORD: billmind
      POSTGRES_DB: billmind
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U billmind -d billmind"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Ollama：启动后自动 pull 视觉 + embedding 模型
  ollama:
    image: ollama/ollama:latest
    container_name: billmind-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
    environment:
      OLLAMA_VISION_MODEL: ${OLLAMA_VISION_MODEL:-qwen2.5vl:7b}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        until ollama list >/dev/null 2>&1; do sleep 2; done
        if [ ! -f /root/.ollama/.models-ready ]; then
          ollama pull "$$OLLAMA_VISION_MODEL"
          ollama pull "$$OLLAMA_EMBEDDING_MODEL"
          touch /root/.ollama/.models-ready
        fi
        wait
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -Fq nomic-embed-text && ollama list | grep -Fq qwen2.5vl"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 60s

  # Etcd：Milvus 的分布式 KV 存储
  etcd:
    container_name: billmind-milvus-etcd
    image: quay.io/coreos/etcd:v3.5.5
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - ./data/etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Minio：Milvus 的分布式对象存储
  minio:
    container_name: billmind-milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - ./data/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Milvus：向量数据库
  milvus:
    image: milvusdb/milvus:v2.4.15
    container_name: billmind-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - ./data/milvus:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 15s
      timeout: 10s
      retries: 10
